name: CI

on:
  push:
    branches: [main, morph]
  pull_request:
    branches: [main, morph]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Build devenv shell
        run: devenv ci

      - name: Check formatting
        run: devenv shell -- treefmt --fail-on-change

  test:
    name: Test
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: bits
          POSTGRES_PASSWORD: please
          POSTGRES_DB: bits_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bits -d bits_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Build devenv shell
        run: devenv ci

      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: maven-${{ hashFiles('deps.edn') }}
          restore-keys: maven-

      - name: Run tests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/bits_test?user=bits&password=please
        run: devenv shell -- clojure -M:test:runner:linux-x86_64

  build:
    name: Build image
    runs-on: ubuntu-24.04
    needs: [lint, test]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=ref,event=branch

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
