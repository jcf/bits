name: Bootstrap

on:
  workflow_dispatch:
  push:
    branches: [main, morph]
    paths:
      - ".forgejo/scripts/**"
      - ".forgejo/workflows/bootstrap.yml"
      - "pkgs/bits-ci/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TERM: xterm

jobs:
  build:
    name: Build
    runs-on: nixos

    steps:
      - uses: actions/checkout@v4

      - name: Configure Attic cache
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: .forgejo/scripts/attic-setup.sh

      - name: Build CI container
        id: build
        run: .forgejo/scripts/build.sh bits-ci

      - name: Push closure to Attic cache
        run: attic push invetica:invetica "${{ steps.build.outputs.image_path }}"

      - name: Push to Forgejo
        env:
          REGISTRY_USER: jcf
          REGISTRY_TOKEN: ${{ secrets.FORGEJO_PKG_TOKEN }}
        run: |
          .forgejo/scripts/push-image.sh "${{ steps.build.outputs.copy_to }}" "git.lan.invetica.co.uk/jcf/bits-ci" "${{ steps.build.outputs.tag }}"
          .forgejo/scripts/push-image.sh "${{ steps.build.outputs.copy_to }}" "git.lan.invetica.co.uk/jcf/bits-ci" "latest"
