name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, morph]
    paths-ignore:
      - .forgejo/workflows/bootstrap.yml
      - .forgejo/workflows/datomic.yml
      - pkgs/bits-ci/**
      - pkgs/datomic-pro/**
      - pkgs/datomic-transactor-container/**
  pull_request:
    branches: [main, morph]
    paths-ignore:
      - .forgejo/workflows/bootstrap.yml
      - .forgejo/workflows/datomic.yml
      - pkgs/bits-ci/**
      - pkgs/datomic-pro/**
      - pkgs/datomic-transactor-container/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  packages: read

env:
  CI: true
  IMAGE: code.invetica.team/jcf/bits-ci:20260226-bc992f8
  TERM: xterm

  # Set to 'true' when ready to publish container images to registries
  PUSH_IMAGES: true

jobs:
  check:
    name: Check
    runs-on: nixos
    container:
      image: ${{ env.IMAGE }}
      credentials:
        username: jcf
        password: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Check
        run: just check

  test:
    name: Test (${{ matrix.suite }})
    runs-on: nixos
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, e2e, generative]
    container:
      image: ${{ env.IMAGE }}
      credentials:
        username: jcf
        password: ${{ github.token }}
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bits
          POSTGRES_PASSWORD: please
          POSTGRES_DB: bits_test
    steps:
      - uses: actions/checkout@v4

      - name: Restore deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: clj-${{ hashFiles('deps.edn') }}
          restore-keys: clj-

      - name: Wait for Postgres
        run: .forgejo/scripts/wait-postgres.sh postgres 5432 bits

      - name: Generate CSS
        if: matrix.suite != 'unit'
        run: tailwindcss --input resources/tailwind.css --output resources/public/app.css

      - name: Test
        env:
          CLUSTER_KEYSTORE_PASSWORD: correct-horse-battery-staple
          DATABASE_URL: postgres://bits:please@postgres:5432/bits_test
          PLATFORM_DOMAIN: bits.page.localhost
        run: clojure -M:dev:test:runner:linux-x86_64 :${{ matrix.suite }} --reporter documentation

      - name: Upload browser sessions
        if: failure() && matrix.suite != 'unit'
        uses: actions/upload-artifact@v4
        with:
          name: browser-sessions-${{ matrix.suite }}
          path: target/browser-sessions
          if-no-files-found: ignore

  build:
    name: Build ${{ matrix.arch }}
    runs-on: nixos
    needs: [check, test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        include:
          - arch: amd64
            output: bits-container-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Configure Attic
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: .forgejo/scripts/attic-setup.sh

      - name: Cache deps
        run: .forgejo/scripts/cache-deps.sh

      - name: Build container
        id: build
        run: .forgejo/scripts/build.sh "${{ matrix.output }}"

      - name: Push to Attic
        run: attic push invetica:invetica "${{ steps.build.outputs.image_path }}"

      - name: Push to Forgejo
        if: env.PUSH_IMAGES == 'true'
        env:
          REGISTRY_USER: jcf
          REGISTRY_TOKEN: ${{ secrets.FORGEJO_PKG_TOKEN }}
        run: |
          .forgejo/scripts/push-image.sh \
            "${{ steps.build.outputs.copy_to }}" \
            "code.invetica.team/jcf/bits" \
            "${{ steps.build.outputs.tag }}-${{ matrix.arch }}"

      - name: Push to GitHub
        if: env.PUSH_IMAGES == 'true'
        env:
          REGISTRY_USER: jcf
          REGISTRY_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          .forgejo/scripts/push-image.sh \
            "${{ steps.build.outputs.copy_to }}" \
            "ghcr.io/jcf/bits" \
            "${{ steps.build.outputs.tag }}-${{ matrix.arch }}"

    outputs:
      version: ${{ steps.build.outputs.tag }}

  manifest:
    name: Create manifest
    runs-on: nixos
    needs: [build]
    if: |
      env.PUSH_IMAGES == 'true' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    container:
      image: ${{ env.IMAGE }}
      credentials:
        username: jcf
        password: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Forgejo manifest
        env:
          REGISTRY_USER: jcf
          REGISTRY_TOKEN: ${{ secrets.FORGEJO_PKG_TOKEN }}
        run: |
          .forgejo/scripts/create-manifest.sh \
            "code.invetica.team/jcf/bits" \
            "${{ needs.build.outputs.version }}" \
            amd64

      - name: GitHub manifest
        env:
          REGISTRY_USER: jcf
          REGISTRY_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          .forgejo/scripts/create-manifest.sh \
            "ghcr.io/jcf/bits" \
            "${{ needs.build.outputs.version }}" \
            amd64

  deploy:
    name: Deploy
    runs-on: nixos
    needs: [build, manifest]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        env:
          REGISTRY_USER: jcf
          REGISTRY_TOKEN: ${{ secrets.FORGEJO_PKG_TOKEN }}
        run: |
          .forgejo/scripts/deploy.sh bits \
            code.invetica.team/jcf/bits:${{ needs.build.outputs.version }}

      - name: Cleanup old images
        env:
          REGISTRY_TOKEN: ${{ secrets.FORGEJO_PKG_TOKEN }}
        run: .forgejo/scripts/cleanup-images.sh code.invetica.team jcf bits 1
