<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Backend unavailable</title>
    <style>
      @font-face {
        font-family: "DM Sans";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(/fonts/DMSans.woff2) format("woff2");
      }
      @font-face {
        font-family: "DM Sans";
        font-style: normal;
        font-weight: 700;
        font-display: swap;
        src: url(/fonts/DMSans.woff2) format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url(/fonts/JetBrainsMono.woff2) format("woff2");
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --surface: #0c0c0e;
        --surface-raised: #161619;
        --border: #2a2a30;
        --primary: #e8e6e3;
        --secondary: #9a9898;
        --muted: #636366;
        --accent: #c8a2ff;
        --accent-dim: #a07ad8;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family:
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background-color: var(--surface);
        color: var(--primary);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        max-width: 28rem;
        text-align: center;
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 2rem;
      }

      .logo svg {
        width: 2rem;
        height: 2rem;
      }

      .logo-text {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
      }

      .card {
        background-color: var(--surface-raised);
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        padding: 2rem;
      }

      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 0.75rem;
      }

      .message {
        color: var(--secondary);
        line-height: 1.6;
        margin-bottom: 1.5rem;
      }

      .hint {
        background-color: var(--surface);
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        padding: 1rem;
        text-align: left;
      }

      .hint-label {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 0.5rem;
      }

      .hint code {
        font-family: "JetBrains Mono", ui-monospace, monospace;
        font-size: 0.875rem;
        color: var(--primary);
        background-color: transparent;
      }

      .status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-top: 1.5rem;
        color: var(--muted);
        font-size: 0.875rem;
      }

      .pulse {
        width: 0.5rem;
        height: 0.5rem;
        background-color: var(--accent);
        border-radius: 50%;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
          transform: scale(0.95);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .footer {
        margin-top: 2rem;
        color: var(--muted);
        font-size: 0.75rem;
      }

      .footer a {
        color: var(--accent-dim);
        text-decoration: none;
      }

      .footer a:hover {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect
            x="3"
            y="3"
            width="7"
            height="7"
            rx="1.5"
            fill="var(--accent)"
          />
          <rect
            x="14"
            y="3"
            width="7"
            height="7"
            rx="1.5"
            fill="var(--accent)"
            opacity="0.6"
          />
          <rect
            x="3"
            y="14"
            width="7"
            height="7"
            rx="1.5"
            fill="var(--accent)"
            opacity="0.6"
          />
          <rect
            x="14"
            y="14"
            width="7"
            height="7"
            rx="1.5"
            fill="var(--accent)"
            opacity="0.3"
          />
        </svg>
        <span class="logo-text">Bits</span>
      </div>

      <div class="card">
        <h1>Backend Isn't Listening</h1>
        <p class="message">
          Traefik can't reach the Clojure server. It may not be running, or is
          still starting up.
        </p>

        <div class="hint">
          <div class="hint-label">Try running</div>
          <code>just dev</code>
        </div>

        <div class="status">
          <span class="pulse"></span>
          <span>Waiting for backend...</span>
        </div>
      </div>

      <div class="footer">
        <a href="javascript:location.reload()">Refresh</a> to try again
      </div>
    </div>
  </body>
</html>
